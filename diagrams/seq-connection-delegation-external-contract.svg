000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206" x="162.5" y="214.875">with external_contract_reference</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260" x="162.5" y="230.1855">(delegator_id, delegator_name, reference)</text><line style="stroke:#181818;stroke-width:1.0;" x1="142.5" x2="184.5" y1="277.2383" y2="277.2383"/><line style="stroke:#181818;stroke-width:1.0;" x1="184.5" x2="184.5" y1="277.2383" y2="290.2383"/><line style="stroke:#181818;stroke-width:1.0;" x1="143.5" x2="184.5" y1="290.2383" y2="290.2383"/><polygon fill="#181818" points="153.5,286.2383,143.5,290.2383,153.5,294.2383,149.5,290.2383" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="149.5" y="272.4961">2</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="85" x="162.5" y="272.4961">Sign Contract</text><polygon fill="#181818" points="471.5,330.8594,481.5,334.8594,471.5,338.8594,475.5,334.8594" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="142.5" x2="477.5" y1="334.8594" y2="334.8594"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="149.5" y="322.4619">3</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="119" x="162.5" y="314.8066">Send Contract with</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150" x="162.5" y="330.1172">ServiceConnectionGrant</text><path d="M340,347.8594 L340,387.8594 L627,387.8594 L627,357.8594 L617,347.8594 L340,347.8594 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M617,347.8594 L617,357.8594 L627,357.8594 L617,347.8594 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"